global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts/pilot-alert-rules.yml

scrape_configs:
  - job_name: school-a-api
    metrics_path: /metrics
    static_configs:
      - targets: ["school_a_api:8000"]
        labels:
          school: school-a
          service: api

  - job_name: school-b-api
    metrics_path: /metrics
    static_configs:
      - targets: ["school_b_api:8000"]
        labels:
          school: school-b
          service: api

  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]
